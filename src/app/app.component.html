<div class="page">

  <!-- ── Hero ── -->
  <section class="hero">
    <h1 class="hero-title">&#9986; Snip</h1>
    <p class="hero-sub">Shorten any URL in one click.</p>

    <!-- Chat-style input shell -->
    <form class="input-shell" (ngSubmit)="shorten()">
      <input
        class="url-input"
        name="url"
        type="url"
        placeholder="Paste a long URL here&hellip;"
        [(ngModel)]="urlInput"
        required
      />
      <button class="shorten-btn" type="submit" [disabled]="submitting()">
        {{ submitting() ? 'Shortening&hellip;' : 'Shorten' }}
      </button>
    </form>

    <!-- Notices -->
    <div class="notices">
      @if (error()) {
        <div class="notice notice-error">{{ error() }}</div>
      }
      @if (created()) {
        <div class="notice notice-success">
          Short link ready:&nbsp;
          <a [href]="created()!.shortUrl" target="_blank" rel="noopener">
            {{ created()!.shortUrl }}
          </a>
        </div>
      }
    </div>
  </section>

  <!-- ── Links card ── -->
  @if (links().length > 0) {
    <section class="links-section">
      <div class="links-card">
        <div class="links-card-header">Your links</div>
        <table>
          <thead>
            <tr>
              <th>Code</th>
              <th>Original URL</th>
              <th>Hits</th>
            </tr>
          </thead>
          <tbody>
            @for (link of links(); track link.code) {
              <tr>
                <td>
                  <a class="code-link" [href]="link.shortUrl" target="_blank" rel="noopener">
                    {{ link.code }}
                  </a>
                </td>
                <td class="url-cell" [title]="link.url">{{ link.url }}</td>
                <td><span class="hits-badge">{{ link.hits }}</span></td>
              </tr>
            }
          </tbody>
        </table>
      </div>
    </section>
  }

</div>
