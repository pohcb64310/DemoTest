<main>
  <h1>&#9986; Snip</h1>
  <p class="tagline">Shorten any URL in one click.</p>

  <form (ngSubmit)="shorten()">
    <input
      name="url"
      type="url"
      placeholder="https://example.com/very/long/url"
      [(ngModel)]="urlInput"
      required
    />
    <button type="submit" [disabled]="submitting()">Shorten</button>
  </form>

  @if (error()) {
    <p class="error">{{ error() }}</p>
  }

  @if (created()) {
    <div class="result">
      Short link:
      <a [href]="created()!.shortUrl" target="_blank" rel="noopener">
        {{ created()!.shortUrl }}
      </a>
    </div>
  }

  @if (links().length > 0) {
    <table>
      <thead>
        <tr>
          <th>Code</th>
          <th>Original URL</th>
          <th>Hits</th>
        </tr>
      </thead>
      <tbody>
        @for (link of links(); track link.code) {
          <tr>
            <td>
              <a [href]="link.shortUrl" target="_blank" rel="noopener">{{ link.code }}</a>
            </td>
            <td class="url-cell" [title]="link.url">{{ link.url }}</td>
            <td>{{ link.hits }}</td>
          </tr>
        }
      </tbody>
    </table>
  }
</main>
