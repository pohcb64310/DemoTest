name: Build and push image

# Fires when a new bundle release is pinned in the superproject (the `bundle`
# path is a submodule pointer — it changes exactly when build-bundle.mjs
# commits a new assembled release).  Also fires when this workflow file itself
# is updated, and supports manual dispatch.

on:
  push:
    branches: [main]
    paths:
      - bundle                             # submodule pointer bumped by build-bundle.mjs
      - .github/workflows/docker.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write                          # required to push to ghcr.io

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Check out (recursive submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Lowercase image name
        id: image
        run: |
          echo "name=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" \
            >> $GITHUB_OUTPUT

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./bundle
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}